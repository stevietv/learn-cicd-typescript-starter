on:
    push:
        branches: [main]

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest

        steps:
            - name: check out code
              uses: actions/checkout@v4

            - name: set up Node
              uses: actions/setup-node@v4
              with:
                node-version: 25
            
            - name: Install dependencies
              run: npm ci

            - name: build image
              run: npm run build

            - id: 'auth'
              uses: 'google-github-actions/auth@v2'
              with:
                credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

            - name: 'Set up Cloud SDK'
              uses: 'google-github-actions/setup-gcloud@v3'

            - name: 'Use gcloud CLI'
              run: 'gcloud info'
            
            - name: push build to GCP
              run: gcloud builds submit --tag us-central1-docker.pkg.dev/high-triode-495207-u3/notely-ar-repo/notely:latest .
            
            - name: deploy to cloud run
              run: gcloud run deply notely --image us-central1-docker.pkg.dev/high-triode-495207-u3/notely-ar-repo/notely:latest --region us-central1 --allow-unauthenticated --project high-triode-495207-u3 --max-instances 4

