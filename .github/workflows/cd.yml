on:
    push:
        branches: [main]

jobs:
    deploy:
        name: Deploy
        runs-on: ubuntu-latest

        steps:
            - name: check out code
              uses: actions/checkout@v4

            - name: set up Node
              uses: actions/setup-node@v4
              with:
                node-version: 25
            
            - name: Install dependencies
              run: npm ci

            - name: build image
              run: npm run build

