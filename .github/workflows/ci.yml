name: ci

on:
    pull_request:
        branches: [main]

jobs:
    tests:
        name: Tests
        runs-on: ubuntu-latest

        steps:
            - name: check out code
              uses: actions/checkout@v4

            - name: set up Node
              uses: actions/setup-node@v4
              with:
                node-version: 22
            
            - name: print node version
              run: node --version